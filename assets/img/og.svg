<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Psikologia.id — Tes Kepribadian Berbahasa Indonesia">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf3ee"/>
      <stop offset="0.65" stop-color="#f7f5ef"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e5b3f"/>
      <stop offset="1" stop-color="#7fa389"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- logo mark + wordmark -->
  <rect x="80" y="72" width="64" height="64" rx="14" fill="#1e5b3f"/>
  <path d="M99 89h20c11 0 18.5 6.6 18.5 17.2S130 123.5 119 123.5h-9.5V140H99V89Zm10.5 9v16.5h8.6c5.2 0 8.8-3.2 8.8-8.2s-3.6-8.3-8.8-8.3H109.5Z" fill="#ffffff"/>
  <text x="164" y="121" font-family="'Plus Jakarta Sans', Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#22302a">Psikologia<tspan fill="#1e5b3f">.id</tspan></text>

  <!-- headline -->
  <text x="80" y="288" font-family="'Plus Jakarta Sans', Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#22302a">Kenali dirimu yang</text>
  <text x="80" y="372" font-family="'Plus Jakarta Sans', Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#1e5b3f">sebenarnya, dengan tenang</text>

  <text x="80" y="440" font-family="'Plus Jakarta Sans', Segoe UI, sans-serif" font-size="30" font-weight="500" fill="#5c6b62">Tes kepribadian Big Five (OCEAN) &amp; HSP — berbahasa Indonesia.</text>

  <!-- trait bars -->
  <g font-family="'Plus Jakarta Sans', Segoe UI, sans-serif">
    <rect x="80"  y="500" width="440" height="14" rx="7" fill="#e8f0ea"/>
    <rect x="80"  y="500" width="360" height="14" rx="7" fill="url(#bar)"/>
    <rect x="560" y="500" width="440" height="14" rx="7" fill="#e8f0ea"/>
    <rect x="560" y="500" width="290" height="14" rx="7" fill="url(#bar)"/>
    <rect x="80"  y="540" width="440" height="14" rx="7" fill="#e8f0ea"/>
    <rect x="80"  y="540" width="210" height="14" rx="7" fill="url(#bar)"/>
    <rect x="560" y="540" width="440" height="14" rx="7" fill="#e8f0ea"/>
    <rect x="560" y="540" width="400" height="14" rx="7" fill="url(#bar)"/>
  </g>
</svg>
